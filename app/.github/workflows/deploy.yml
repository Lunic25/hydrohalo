name: Launch Pi 5 GUI Application

on:
  push:
    branches: [ main ]

jobs:
  launch-gui:
    runs-on: self-hosted

    steps:
      - name: Fetch repository updates
        uses: actions/checkout@v4

      - name: Force GUI to appear on local Pi Monitor
        run: |
          # 1. Authorize the internal runner to draw on the local desktop session
          export XDG_RUNTIME_DIR=/run/user/1000
          export WAYLAND_DISPLAY=wayland-0
          export DISPLAY=:0
          
          # 2. Run your code in the background so the action step doesn't freeze
          python3 main.py &
